<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }} - {{ site.title }}</title>
  <meta name="description" content="{{ summary }}">
  <meta name="author" content="{{ site.author.name }}">
  <meta name="robots" content="index, follow">

  <meta property="og:title" content="{{ title }}">
  <meta property="og:description" content="{{ summary }}">
  <meta property="og:type" content="article">
  <meta property="og:url" content="{{ canonical_url }}">
  <meta property="og:image" content="{{ site.base_url }}/images/avatar.png">

  <meta name="twitter:card" content="summary">
  <meta name="twitter:site" content="@t0msec23">
  <meta name="twitter:title" content="{{ title }}">
  <meta name="twitter:description" content="{{ summary }}">

  <link rel="canonical" href="{{ canonical_url }}">
  <link rel="alternate" hreflang="{{ alt_lang }}" href="{{ alt_url }}">
  <link rel="stylesheet" href="{{ site.base_url }}/css/style.css">
  <link rel="icon" href="{{ site.base_url }}/favicon.ico">
</head>
<body>

  <!-- ===== Header ===== -->
  <header class="site-header">
    <div class="header-inner">
      <a href="{{ site.base_url }}/{{ lang }}/" class="site-logo">
        {{ site.title }}
      </a>
      <nav class="nav-links">
        <a href="{{ site.base_url }}/{{ lang }}/">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          <span class="nav-label">Home</span>
        </a>
        <a href="{{ site.base_url }}/{{ lang }}/posts/">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          <span class="nav-label">Posts</span>
        </a>
        <a href="{{ site.base_url }}/{{ lang }}/about/">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <span class="nav-label">About</span>
        </a>
        <div class="lang-switch">
          <a href="{{ site.base_url }}/ja{{ current_path | default('/') }}" {% if lang == 'ja' %}class="active"{% endif %}>JA</a>
          <a href="{{ site.base_url }}/en{{ current_path | default('/') }}" {% if lang == 'en' %}class="active"{% endif %}>EN</a>
        </div>
      </nav>
    </div>
  </header>

  <!-- ===== Main Content ===== -->
  <main class="post-page">
    <a href="{{ site.base_url }}/{{ lang }}/posts/" class="post-back-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      {% if lang == 'ja' %}記事一覧に戻る{% else %}Back to Posts{% endif %}
    </a>

    <article class="post-article">
      <header class="post-header">
        {% if category %}
        <a href="{{ site.base_url }}/{{ lang }}/posts/?category={{ category }}" class="post-category-badge">{{ category }}</a>
        {% endif %}
        <h1 class="post-title">{{ title }}</h1>
        <div class="post-meta">
          <span class="post-meta-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            {{ date }}
          </span>
        </div>
        {% if tags %}
        <div class="post-tags">
          {% for tag in tags %}
          <a href="{{ site.base_url }}/{{ lang }}/posts/?tag={{ tag }}">#{{ tag }}</a>
          {% endfor %}
        </div>
        {% endif %}
      </header>

      <div class="post-content">
        {{ content }}
      </div>
    </article>
  </main>

  <!-- ===== Footer ===== -->
  <footer class="site-footer">
    <p>&copy; {{ year }} {{ site.title }}</p>
  </footer>

</body>
</html>
