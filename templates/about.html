<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About - {{ site.title }}</title>
  <meta name="description" content="{% if lang == 'ja' %}{{ site.author.name }}について{% else %}About {{ site.author.name }}{% endif %}">
  <meta name="author" content="{{ site.author.name }}">

  <link rel="stylesheet" href="{{ site.base_url }}/css/style.css">
  <link rel="icon" href="{{ site.base_url }}/favicon.ico">
</head>
<body>

  <!-- ===== Header ===== -->
  <header class="site-header">
    <div class="header-inner">
      <a href="{{ site.base_url }}/{{ lang }}/" class="site-logo">
        {{ site.title }}
      </a>
      <nav class="nav-links">
        <a href="{{ site.base_url }}/{{ lang }}/">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          <span class="nav-label">Home</span>
        </a>
        <a href="{{ site.base_url }}/{{ lang }}/posts/">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          <span class="nav-label">Posts</span>
        </a>
        <a href="{{ site.base_url }}/{{ lang }}/about/" class="active">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <span class="nav-label">About</span>
        </a>
        <div class="lang-switch">
          <a href="{{ site.base_url }}/ja{{ current_path | default('/') }}" {% if lang == 'ja' %}class="active"{% endif %}>JA</a>
          <a href="{{ site.base_url }}/en{{ current_path | default('/') }}" {% if lang == 'en' %}class="active"{% endif %}>EN</a>
        </div>
      </nav>
    </div>
  </header>

  <!-- ===== Main ===== -->
  <main class="post-page about-page">
    <article class="post-article">
      <header class="post-header">
        <h1 class="post-title">About</h1>
      </header>
      <div class="post-content">
        {{ content }}
      </div>
    </article>
  </main>

  <!-- ===== Footer ===== -->
  <footer class="site-footer">
    <p>&copy; {{ year }} {{ site.title }}</p>
  </footer>

</body>
</html>
